<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCA Lead Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .header h1 { color: #10b981; font-size: 28px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .stat-card h3 {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #10b981;
        }
        .pipeline {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .pipeline h2 { margin-bottom: 20px; }
        .pipeline-columns {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        .pipeline-column {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            min-height: 200px;
        }
        .pipeline-column h4 {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
        }
        .lead-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #10b981;
        }
        .lead-card.hot { border-left-color: #ef4444; }
        .lead-card.warm { border-left-color: #f59e0b; }
        .lead-card .business-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .lead-card .details {
            font-size: 12px;
            color: #94a3b8;
        }
        .lead-card .score {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
        }
        .score.high { background: #ef4444; color: white; }
        .score.medium { background: #f59e0b; color: black; }
        .score.low { background: #10b981; color: white; }
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #10b981; color: white; }
        .btn-secondary { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 MCA Lead Dashboard</h1>
        <span id="last-updated">Updated: Just now</span>
    </div>
    
    <div class="actions">
        <button class="btn btn-primary">+ Add Lead</button>
        <button class="btn btn-secondary">Import from Scraper</button>
        <button class="btn btn-secondary">Export Data</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Leads</h3>
            <div class="value" id="total-leads">0</div>
        </div>
        <div class="stat-card">
            <h3>Hot Leads (70+ Score)</h3>
            <div class="value" id="hot-leads">0</div>
        </div>
        <div class="stat-card">
            <h3>In Pipeline</h3>
            <div class="value" id="pipeline-count">0</div>
        </div>
        <div class="stat-card">
            <h3>Potential Commission</h3>
            <div class="value" id="potential-commission">$0</div>
        </div>
    </div>

    <div class="pipeline">
        <h2>Sales Pipeline</h2>
        <div class="pipeline-columns">
            <div class="pipeline-column">
                <h4>New Leads</h4>
                <div id="col-new"></div>
            </div>
            <div class="pipeline-column">
                <h4>Contacted</h4>
                <div id="col-contacted"></div>
            </div>
            <div class="pipeline-column">
                <h4>Qualified</h4>
                <div id="col-qualified"></div>
            </div>
            <div class="pipeline-column">
                <h4>Proposal</h4>
                <div id="col-proposal"></div>
            </div>
            <div class="pipeline-column">
                <h4>Funded</h4>
                <div id="col-funded"></div>
            </div>
        </div>
    </div>

    <script>
        // This would connect to your SQLite DB via API
        // For now, showing the structure
        
        const sampleData = {
            totalLeads: 47,
            hotLeads: 12,
            pipelineCount: 8,
            potentialCommission: "$24,500"
        };
        
        document.getElementById('total-leads').textContent = sampleData.totalLeads;
        document.getElementById('hot-leads').textContent = sampleData.hotLeads;
        document.getElementById('pipeline-count').textContent = sampleData.pipelineCount;
        document.getElementById('potential-commission').textContent = sampleData.potentialCommission;
        
        // Sample lead cards
        const sampleLead = `
            <div class="lead-card hot">
                <div class="business-name">Texas Elite Trucking</div>
                <div class="details">Houston, TX • 15 employees</div>
                <span class="score high">Score: 85</span>
            </div>
        `;
        
        document.getElementById('col-new').innerHTML = sampleLead;
    </script>
</body>
</html>
